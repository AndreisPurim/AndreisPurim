<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
  <title>Andreis' Notebook</title>
  <meta name="description" content="A blog about things Andreis is learning.">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Loads whatever favicon is in the main site -->
  <link rel="icon" href="https://andreispurim.github.io/icons/favicon.ico" type="image/x-icon" sizes="16x16 32x32" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Andreis\' Notebook',
      auto2top: true,
      loadSidebar: true,
      maxLevel: 0,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: [],
        placeholder: 'Type to search...',
        placeholder: {
          '/': 'Type to search...'
        },
        noData: 'No Results!',
        noData: {
          '/': 'No Results!'
        },
        depth: 2,
        hideOtherSidebarContent: false,
        themeColor: '#6b21a8',
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
</body>
</html>
